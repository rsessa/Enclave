<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Content Security Policy: Strict Offline mode -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob:; connect-src 'none'; font-src 'self' data:;" />
    <title>Enclave - Secure Console</title>
    <!-- Quill CSS via local file or injected bundle -->
    <link href="/node_modules/quill/dist/quill.snow.css" rel="stylesheet">
    <link href="/src/style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app" class="app-container">
      
      <!-- Top Right Header: Theme Toggle -->
      <div class="top-right-header">
        <button id="btn-theme-toggle" class="btn" title="Toggle Light/Dark Mode">🌓</button>
      </div>

      <!-- Floating Sidebar -->
      <aside class="floating-sidebar">
        <div class="brand-vertical">
          <div class="lock-icon">🔒</div>
        </div>
        
        <div class="sidebar-actions">
          <!-- Table Popper -->
          <div class="popover-container">
            <button id="btn-add-table" class="btn" title="Añadir Tabla">⊞</button>
            <div class="popover-content table-grid-popover">
              <div id="table-grid-container" class="table-grid"></div>
              <div id="table-grid-label" class="table-grid-label">0x0</div>
            </div>
          </div>
          
          <!-- Format Dropdown -->
          <div class="popover-container format-dropdown-container">
            <button id="btn-format-menu" class="btn" title="Formato / Log">≢</button>
            <div id="format-dropdown" class="popover-content dropdown-menu">
              <button id="btn-bold" class="dropdown-item"><strong>B</strong> Negrita</button>
              <button id="btn-italic" class="dropdown-item"><em>I</em> Cursiva</button>
              <button id="btn-underline" class="dropdown-item"><u>U</u> Subrayado</button>
              <button id="btn-code" class="dropdown-item"><code>&lt;/&gt;</code> Código en línea</button>
              <div class="dropdown-divider"></div>
              <button id="btn-format-log" class="dropdown-item accent">≢ Formatear Log Seleccionado</button>
            </div>
          </div>

          <button id="btn-breakout" class="btn" title="Salir de Bloque / Nuevo Párrafo">↵</button>
          
          <div class="sidebar-divider"></div>
          
          <button id="btn-copy" class="btn" title="Copiar al Portapapeles">📋</button>
          
          <div class="sidebar-divider"></div>
          
          <button id="btn-save-template" class="btn" title="Guardar Plantilla">💾</button>
          <button id="btn-load-template" class="btn" title="Cargar Plantilla">📂</button>
          
          <div class="sidebar-divider"></div>
          
          <button id="btn-structura" class="btn btn-accent" title="Lanzar Structura">S</button>
        </div>
      </aside>
      
      <!-- Tab Strip -->
      <nav class="tab-strip">
        <div id="tabs-container" class="tabs">
          <!-- Dynamic Tabs -->
        </div>
        <button id="btn-new-tab" class="btn-new-tab">+</button>
      </nav>
      
      <!-- Editor Area -->
      <main class="editor-container">
        <div id="quill-editor"></div>
      </main>
      
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
